<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Petfolk Job Scraper</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <span class="version-tag">v2.0</span>
    <div class="header-inner">
      <div class="logo">
        <img src="icons/petfolk-logo.png" alt="Petfolk">
      </div>
      <div class="title-section">
        <h1>Petfolk</h1>
        <p>Rippling Job Scraper</p>
      </div>
    </div>
  </div>

  <div id="loadingIndicator" class="loading-card hidden">
    <div class="spinner"></div>
    <span>Scraping... Please wait.</span>
  </div>

  <div class="action-buttons">
    <button id="startScraping" class="btn-primary">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8,5.14V19.14L19,12.14L8,5.14Z"/>
      </svg>
      <span>Start Scraping</span>
    </button>

    <button id="stopScraping" class="btn-danger">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M18,18H6V6H18V18Z"/>
      </svg>
      <span>Stop Scraping</span>
    </button>

    <button id="viewRecords" class="btn-success">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 17h10v-2H7v2zm0-4h10v-2H7v2zm0-4h10V7H7v2z"/>
      </svg>
      <span>View Records</span>
    </button>
  </div>

  <div class="footer">
    <p>Navigate to <a href="https://ats.rippling.com/petfolk/jobs?page=0&amp;jobBoardSlug=petfolk" target="_blank">Petfolk Careers</a>. Start Scraping applies Department: Medical, then saves the listings.</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
