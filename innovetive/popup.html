<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Innovetive Petcare Scraper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <span class="version-tag">v1.7</span>
    <div class="header-inner">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20,6H16V4A2,2 0 0,0 14,2H10A2,2 0 0,0 8,4V6H4A2,2 0 0,0 2,8V19A2,2 0 0,0 4,21H20A2,2 0 0,0 22,19V8A2,2 0 0,0 20,6M10,4H14V6H10V4M20,19H4V8H20V19M11,10H13V13H16V15H13V18H11V15H8V13H11V10Z"/>
        </svg>
      </div>
      <div class="title-section">
        <h1>Innovetive Petcare</h1>
        <p>Job Scraper Extension</p>
      </div>
    </div>
  </div>

  <div id="loadingIndicator" class="loading-card hidden">
    <div class="spinner"></div>
    <span>Scraping... Please wait.</span>
  </div>

  <div class="action-buttons">
    <button id="startScraping" class="btn-primary">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8,5.14V19.14L19,12.14L8,5.14Z"/>
      </svg>
      <span>Start Scraping</span>
    </button>

    <button id="stopScraping" class="btn-danger">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M18,18H6V6H18V18Z"/>
      </svg>
      <span>Stop Scraping</span>
    </button>

    <button id="viewRecords" class="btn-success">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19,3H5C3.9,3 3,3.9 3,5V19C3,20.1 3.9,21 5,21H19C20.1,21 21,20.1 21,19V5C21,3.9 20.1,3 19,3M19,19H5V5H19V19M7,17H17V15H7V17M7,13H17V11H7V13M7,9H17V7H7V9Z"/>
      </svg>
      <span>View Records</span>
    </button>
  </div>

  <div class="footer">
    <p>Open <a href="https://innovetivepetcare.pinpointhq.com/all-opportunities" target="_blank">Innovetive Careers</a>, click Start Scraping, then use View Records.</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
