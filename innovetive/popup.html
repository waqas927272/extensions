<!DOCTYPE html>
<html>
<head>
  <title>Innovetive Petcare Scraper</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
  <div class="popup-header">
    <h1>Innovetive Petcare</h1>
    <p class="popup-subtitle">Job Scraper Extension</p>
  </div>

  <div class="popup-body">
    <div class="stat-card">
      <div class="stat-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <div class="stat-info">
        <span class="stat-value" id="job-count">0</span>
        <span class="stat-label">Saved Jobs</span>
      </div>
    </div>

    <div class="action-buttons">
      <button id="scrape-jobs" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        <span>Scrape Jobs</span>
      </button>
      <button id="view-saved-jobs" class="btn btn-accent">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <span>View Saved Jobs</span>
      </button>
      <button id="clear-jobs" class="btn btn-danger">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
        <span>Clear Jobs</span>
      </button>
    </div>

    <div id="loading-spinner" class="hidden">
      <div class="spinner"></div>
      <span>Scraping jobs...</span>
    </div>

    <div id="message" class="hidden"></div>
  </div>

  <div class="popup-footer">
    <span>Innovetive Scraper v1.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
