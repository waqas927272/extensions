<!DOCTYPE html>
<html>
<head>
  <title>Scraped Job Records</title>
  <link rel="stylesheet" type="text/css" href="records.css">
</head>
<body>
  <div class="sidebar">
    <button id="getJobDescriptions">Get Job Descriptions</button>
    <div class="button-container">
      <button id="clearRecords">Clear Records</button>
      <button id="downloadCsv">Download CSV</button>
      <div>
        <label for="webhookUrlInput">Webhook URL:</label>
        <input type="text" id="webhookUrlInput" placeholder="Enter webhook URL">
      </div>
      <button id="sendToWebhook">Send to Webhook</button>
    </div>
  </div>
  <div class="main-content">
    <h1>Scraped Job Records</h1>
    <table id="jobRecordsTable">
      <thead>
        <tr>
          <th data-sort="title">Job Title</th>
          <th data-sort="hospital">Hospital</th>
          <th data-sort="state">State</th>
          <th data-sort="country">Country</th>
          <th data-sort="link">Link</th>
          <th>Actions</th> <!-- Added for View Description button -->
        </tr>
      </thead>
      <tbody>
        <!-- Scraped data will be inserted here by records.js -->
      </tbody>
    </table>
  </div>
  <script src="records.js"></script>

  <div id="descriptionModal" class="modal">
    <div class="modal-content">
      <span class="close-button">&times;</span>
      <h2>Job Description</h2>
      <div id="modalDescriptionContent"></div>
    </div>
  </div>
</body>
</html>
