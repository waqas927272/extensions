<!DOCTYPE html>
<html>
<head>
  <title>Job Scraper</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 200px;
      padding: 10px;
    }
    button {
      width: 100%;
      padding: 8px;
      margin-bottom: 5px;
      cursor: pointer;
    }
    #loadingIndicator {
      display: none; /* Hidden by default */
      text-align: center;
      padding: 10px;
      font-weight: bold;
      color: blue;
    }
  </style>
</head>
<body>
  <div id="loadingIndicator">Scraping... Please wait.</div>
  <button id="startScraping">Start Scraping</button>
  <button id="stopScraping">Stop Scraping</button>
  <button id="viewRecords">View Records</button>
  <script src="popup.js"></script>
</body>
</html>
