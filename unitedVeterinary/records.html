<!DOCTYPE html>
<html>
<head>
  <title>Scraped Job Records</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
      cursor: pointer;
    }
    .sort-asc::after {
        content: " ▲";
    }
    .sort-desc::after {
        content: " ▼";
    }
    .clear-button {
        margin-top: 20px;
        padding: 10px 15px;
        background-color: #f44336;
        color: white;
        border: none;
        cursor: pointer;
    }
    .clear-button:hover {
        background-color: #d32f2f;
    }
  </style>
</head>
<body>
  <h1>Scraped Job Records</h1>
  <p id="jobCount">Total Scraped Jobs: 0</p>
  <button id="clearRecords" class="clear-button">Clear All Records</button>

  <div style="margin-top: 20px;">
    <input type="text" id="webhookUrl" placeholder="Enter Webhook URL (e.g., http://localhost/webhook)" style="width: 100%; padding: 8px; box-sizing: border-box;">
    <button id="sendToWebhook" class="clear-button" style="background-color: #4CAF50;">Send to Webhook</button>
  </div>
  <table id="jobRecordsTable">
    <thead>
      <tr>
        <th data-sort="title">Job Title</th>
        <th data-sort="hospital">Hospital</th>
        <th data-sort="city">City</th>
        <th data-sort="location">Location</th>
        <th data-sort="link">Link</th>
      </tr>
    </thead>
    <tbody>
      <!-- Scraped data will be inserted here by records.js -->
    </tbody>
  </table>
  <script src="records.js"></script>
</body>
</html>
