<!DOCTYPE html>
<html>
<head>
  <title>Job Scraper</title>
  <link rel="stylesheet" type="text/css" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z" fill="currentColor"/>
      </svg>
      <h1>Job Scraper</h1>
    </div>
  </div>

  <div class="content">
    <div class="controls">
      <button id="startScraping" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 3v10l8-5-8-5z" fill="currentColor"/>
        </svg>
        Start Scraping
      </button>
      <button id="stopScraping" class="btn btn-danger">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="4" width="8" height="8" fill="currentColor"/>
        </svg>
        Stop Scraping
      </button>
      <button id="viewRecords" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 3h12v2H2V3zm0 4h12v2H2V7zm0 4h12v2H2v-2z" fill="currentColor"/>
        </svg>
        View Records
      </button>
    </div>

    <div id="loadingMessage" class="loading">
      <div class="spinner"></div>
      <span>Scraping in progress...</span>
    </div>

    <div class="divider"></div>

    <div id="stats" class="stats">
      <div class="stat-item">
        <div class="stat-label">Session</div>
        <div class="stat-value" id="sessionCount">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">On Page</div>
        <div class="stat-value" id="pageTotal">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Total Saved</div>
        <div class="stat-value" id="totalRecords">0</div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
