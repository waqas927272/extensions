<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LAASER Job Scraper</title>
  <link rel="stylesheet" type="text/css" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="images/logo.png" alt="LAASER Logo" class="logo">
      <div class="header-text">
        <h1>LAASER Job Scraper</h1>
        <span class="subtitle">Indeed.com Company Page</span>
      </div>
    </div>

    <div class="stats-card">
      <div class="stat-item">
        <div class="stat-icon stat-icon-blue">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
          </svg>
        </div>
        <span class="stat-value" id="totalJobsOnPage">0</span>
        <span class="stat-label">On Page</span>
      </div>
      <div class="stat-item">
        <div class="stat-icon stat-icon-green">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <span class="stat-value" id="scrapedRecords">0</span>
        <span class="stat-label">Scraped</span>
      </div>
    </div>

    <div id="loadingIndicator" class="loading-indicator hidden">
      <div class="spinner"></div>
      Scraping jobs...
    </div>

    <div class="button-group">
      <button id="startScraping" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
        Start
      </button>
      <button id="stopScraping" class="btn btn-danger" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="6" y="6" width="12" height="12"></rect>
        </svg>
        Stop
      </button>
    </div>

    <button id="viewRecords" class="btn btn-secondary btn-full">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="16" y1="13" x2="8" y2="13"></line>
        <line x1="16" y1="17" x2="8" y2="17"></line>
      </svg>
      View Records
    </button>

    <div class="footer">
      <span class="filter-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="16"></line>
          <line x1="8" y1="12" x2="16" y2="12"></line>
        </svg>
        indeed.com/cmp/LAASER
      </span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
